services:
  supplier-rag:
    build:
      context: .
      dockerfile: Dockerfile
    image: supplier-rag:latest
    container_name: supplier-rag
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HF_LOCAL_FILES_ONLY: "false"
      FRONTEND_ORIGINS: "http://localhost:8000,http://127.0.0.1:8000"
    volumes:
      - ./data/raw:/app/data/raw
      - ./storage/chroma:/app/storage/chroma
    restart: unless-stopped
